services:
  # Backend Service
  - type: web
    name: travsify-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: travsify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NDC_API_SEARCH_URL
        sync: false
      - key: NDC_API_ACTION_URL
        sync: false
      - key: NDC_API_LOGIN
        sync: false
      - key: NDC_API_PASS
        sync: false
      - key: NDC_API_TOKEN
        sync: false
      - key: NDC_API_DEVICE_ID
        sync: false
      - key: LITEAPI_API_KEY
        sync: false
      - key: ATLYS_API_KEY
        sync: false
      - key: GETYOURGUIDE_API_KEY
        sync: false
      - key: MOZIO_API_KEY
        sync: false
      - key: SAFETYWING_PARTNER_ID
        sync: false
      - key: FINCRA_API_KEY
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: NDC_SITECITY_ENABLED
        value: "false"

  # Frontend Service
  - type: web
    name: travsify-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: travsify-backend
          property: host

databases:
  - name: travsify-db
    plan: free
